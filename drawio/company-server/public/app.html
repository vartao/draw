      function pasteClipboard() {
        if (!clipboardItem) {
          return;
        }

        if (clipboardItem.kind === 'folder' && (clipboardItem.id === currentFolderId || isDescendantFolder(currentFolderId, clipboardItem.id))) {
          notify('不能把文件夹粘贴到自己或子文件夹里。', 'error');
          return;
        }

        pasteButton.disabled = true;
        setStatus('正在粘贴');

        if (clipboardItem.kind === 'files') {
          runSequential(clipboardItem.ids, function (fileId) {
            return api('/api/files/' + encodeURIComponent(fileId) + '/' + clipboardItem.action, {
              method: 'POST',
              body: JSON.stringify({ folderId: currentFolderId })
            });
          })
            .then(function () {
              notify(clipboardItem.action === 'cut' ? '已移动选中的图纸。' : '已复制选中的图纸。', 'ok');

              if (clipboardItem.action === 'cut') {
                clipboardItem = null;
              }

              clearSelectedFiles();
              return loadFiles();
            })
            .catch(function (err) {
              notify(operationErrorText(err), 'error');
            })
            .finally(updateClipboardState);
          return;
        }

        var endpoint = clipboardItem.kind === 'folder' ?
          '/api/folders/' + encodeURIComponent(clipboardItem.id) + '/' + clipboardItem.action :
          '/api/files/' + encodeURIComponent(clipboardItem.id) + '/' + clipboardItem.action;
        var payload = clipboardItem.kind === 'folder' ?
          { parentId: currentFolderId } :
          { folderId: currentFolderId };

        api(endpoint, {
          method: 'POST',
          body: JSON.stringify(payload)
        })
          .then(function () {
            notify(clipboardItem.action === 'cut' ? '已移动。' : '已复制。', 'ok');

            if (clipboardItem.action === 'cut') {
              clipboardItem = null;
            }

            return loadFiles();
          })
          .catch(function (err) {
            notify(operationErrorText(err), 'error');
          })
          .finally(updateClipboardState);
      }

      api('/api/me')
        .then(function (body) {
          if (!body.authenticated) {
            window.location.replace('/login.html?next=' + encodeURIComponent('/app.html'));
            return;
          }

          updateWhoami(body);
          adminButton.classList.toggle('hidden', !body.canAdmin);
          loadFiles();
          loadInternalShares();
          loadAiProviders();
        })
        .catch(function () {});

      loadAiConfig();
      var lastAiProviderFormat = aiProviderFormat.value;

      aiProviderSelect.addEventListener('change', function () {
        var provider = aiProviderById(aiProviderSelect.value);

        if (provider) {
          applyAiProvider(provider);
        } else {
          aiApiKey.placeholder = '可在设置里添加到工号';
          renderAiProviderList();
          updateAiCurrentConfig();
          scheduleAiConfigSave();
        }

        saveAiProviderSelection(aiProviderSelect.value).catch(function (err) {
          if (!err || err.error !== 'not_authenticated') {
            var message = aiErrorText(err);
            setAiStatus(message, 'error');
            notify(message, 'error');
          }
        });
      });

      aiProviderSettingsButton.addEventListener('click', openAiSettings);
      aiSettingsCloseButton.addEventListener('click', closeAiSettings);
      aiProviderSettings.addEventListener('mousedown', function (evt) {
        if (evt.target === aiProviderSettings) {
          closeAiSettings();
        }
      });

      aiNewProviderButton.addEventListener('click', startNewAiProvider);
      aiSaveProviderButton.addEventListener('click', saveAiProvider);
      aiDeleteProviderButton.addEventListener('click', deleteAiProvider);
      aiCancelProviderEditButton.addEventListener('click', function () {
        resetAiProviderEdit();

        if (aiProviderSelect.value) {
          applyAiProvider(aiProviderById(aiProviderSelect.value));
        }
      });
      aiProviderName.addEventListener('keydown', function (evt) {
        if (evt.key === 'Enter') {
          evt.preventDefault();
          saveAiProvider();
        }
      });
      aiProviderList.addEventListener('click', function (evt) {
        var selectButton = evt.target.closest('[data-provider-select]');
        var editButton = evt.target.closest('[data-provider-edit]');
        var providerId = selectButton ? selectButton.getAttribute('data-provider-select') : editButton && editButton.getAttribute('data-provider-edit');
        var provider = aiProviderById(providerId);

        if (!provider) {
          return;
        }

        if (editButton) {
          editAiProvider(provider);
          return;
        }

        applyAiProvider(provider);
        saveAiProviderSelection(provider.id).catch(function () {});
      });

      aiProviderFormat.addEventListener('change', function () {
        var previousDefault = providerDefaultBaseUrl(lastAiProviderFormat);
        var nextDefault = providerDefaultBaseUrl(aiProviderFormat.value);

        if (!aiBaseUrl.value.trim() || aiBaseUrl.value.trim() === previousDefault) {
          aiBaseUrl.value = nextDefault;
        }

        lastAiProviderFormat = aiProviderFormat.value;
        markAiModelsStale();
        scheduleAiConfigSave();
      });

      aiDiagramType.addEventListener('change', scheduleAiConfigSave);
      aiBaseUrl.addEventListener('input', markAiModelsStale);
      aiApiKey.addEventListener('input', markAiModelsStale);
      aiModelSelect.addEventListener('change', function () {
        aiModel.value = aiModelSelect.value;
        setAiModelHint(aiModel.value ? '已选择 ' + aiModel.value : '');
        updateAiCurrentConfig();
        scheduleAiConfigSave();
      });
      aiModel.addEventListener('input', function () {
        resetAiModelOptions('加载模型后选择', aiModel.value.trim(), { keepManualModelVisible: true });
        updateAiCurrentConfig();
        scheduleAiConfigSave();
      });

      Array.prototype.forEach.call(document.querySelectorAll('[data-ai-example]'), function (button) {
        button.addEventListener('click', function () {
          var type = button.getAttribute('data-ai-type');
          if (type) {
            aiDiagramType.value = type;
          }
          aiPrompt.value = button.getAttribute('data-ai-example') || '';
          aiPrompt.focus();
          scheduleAiConfigSave();
        });
      });

      refreshButton.addEventListener('click', loadFiles);
      selectAllFilesCheckbox.addEventListener('change', toggleSelectAllFiles);
      pageSizeSelect.addEventListener('change', function () {
        pageSize = Number(pageSizeSelect.value) || 25;
        currentPage = 1;
        renderLibrary();
      });
      prevPageButton.addEventListener('click', function () {
        goToPage(currentPage - 1);
      });
      nextPageButton.addEventListener('click', function () {
        goToPage(currentPage + 1);
      });
      bulkOpenButton.addEventListener('click', openSelectedFiles);
      bulkRenameButton.addEventListener('click', renameSelectedFile);
      bulkCopyButton.addEventListener('click', copySelectedFiles);
      bulkCutButton.addEventListener('click', cutSelectedFiles);
      bulkShareButton.addEventListener('click', shareSelectedFile);
      bulkInternalShareButton.addEventListener('click', shareSelectedFileInternal);
      bulkDownloadButton.addEventListener('click', downloadSelectedFiles);
      bulkDeleteButton.addEventListener('click', deleteSelectedFiles);
      clearSelectionButton.addEventListener('click', clearSelectedFiles);
      refreshInternalSharesButton.addEventListener('click', loadInternalShares);
      sendInternalMessageButton.addEventListener('click', sendInternalMessage);
      openInternalShareButton.addEventListener('click', openInternalShareViewer);
      profileButton.addEventListener('click', function () {
        window.location.href = '/profile.html';
      });
      adminButton.addEventListener('click', function () {
        window.location.href = '/admin.html';
      });
      internalShareCloseButton.addEventListener('click', closeInternalShareDialog);
      internalShareCancelButton.addEventListener('click', closeInternalShareDialog);
      internalShareSendButton.addEventListener('click', sendInternalShare);
      internalShareDialog.addEventListener('mousedown', function (evt) {
        if (evt.target === internalShareDialog) {
          closeInternalShareDialog();
        }
      });
      internalMessageInput.addEventListener('keydown', function (evt) {
        if ((evt.ctrlKey || evt.metaKey) && evt.key === 'Enter') {
          evt.preventDefault();
          sendInternalMessage();
        }
      });
      internalRecipientSearch.addEventListener('input', function () {
        renderEmployeeOptions(internalEmployees);
      });
      internalRecipientList.addEventListener('change', function (evt) {
        if (!evt.target || evt.target.type !== 'checkbox') {
          return;
        }

        if (evt.target.checked) {
          selectedInternalEmployeeIds.add(evt.target.value);
        } else {
          selectedInternalEmployeeIds.delete(evt.target.value);
        }

        renderEmployeeOptions(internalEmployees);
      });
      internalSelectedRecipients.addEventListener('click', function (evt) {
        var target = evt.target.closest('[data-remove-recipient]');

        if (!target) {
          return;
        }

        selectedInternalEmployeeIds.delete(target.getAttribute('data-remove-recipient'));
        renderEmployeeOptions(internalEmployees);
        internalRecipientSearch.focus();
      });
      newButton.addEventListener('click', createFile);
      newFolderButton.addEventListener('click', createFolder);
      folderTree.addEventListener('contextmenu', function (evt) {
        if (evt.target === folderTree) {
          showFolderTreeContextMenu(evt, null);
        }
      });
      folderTree.addEventListener('scroll', hideFolderTreeContextMenu);
      document.addEventListener('mousedown', hideFolderTreeContextMenu);
      window.addEventListener('resize', hideFolderTreeContextMenu);
      pasteButton.addEventListener('click', pasteClipboard);
      aiToolbarButton.addEventListener('click', openAiPanel);
      aiEntryButton.addEventListener('click', openAiPanel);
      aiCloseButton.addEventListener('click', closeAiPanel);
      aiGenerateButton.addEventListener('click', generateDiagram);
      aiLoadModelsButton.addEventListener('click', loadAiModels);
      aiSaveConfigButton.addEventListener('click', saveAiConfig);
      aiAssistant.addEventListener('mousedown', function (evt) {
        if (evt.target === aiAssistant) {
          closeAiPanel();
        }
      });
      document.addEventListener('keydown', function (evt) {
        if (evt.key === 'Escape') {
          hideFolderTreeContextMenu();
        }

        if (evt.key === 'Escape' && !aiProviderSettings.classList.contains('hidden')) {
          closeAiSettings();
        } else if (evt.key === 'Escape' && !aiAssistant.classList.contains('hidden')) {
          closeAiPanel();
        }
      });
      logoutButton.addEventListener('click', logout);
    }());
  </script>
</body>
</html>
