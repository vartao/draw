<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的图纸 - 公司画图工具</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/company.css?v=ai-progress-skills-20260705">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img src="/images/drawlogo.svg" alt="">
        <div>
          <h1>我的图纸</h1>
          <div id="whoami" class="subtle"></div>
        </div>
      </div>
      <div class="toolbar">
        <button id="profileButton" type="button"><span class="btn-icon" aria-hidden="true">人</span><span>个人信息</span></button>
        <button id="adminButton" class="hidden" type="button"><span class="btn-icon" aria-hidden="true">管</span><span>账号管理</span></button>
        <button id="aiToolbarButton" type="button"><span class="btn-icon" aria-hidden="true">AI</span><span>AI 生成</span></button>
        <button id="refreshButton" type="button"><span class="btn-icon" aria-hidden="true">↻</span><span>刷新</span></button>
        <button id="newFolderButton" type="button"><span class="btn-icon" aria-hidden="true">▣</span><span>新建文件夹</span></button>
        <button id="pasteButton" type="button" disabled><span class="btn-icon" aria-hidden="true">⎘</span><span>粘贴</span></button>
        <button id="newButton" class="primary" type="button"><span class="btn-icon" aria-hidden="true">+</span><span>新建图纸</span></button>
        <button id="logoutButton" type="button"><span class="btn-icon" aria-hidden="true">↪</span><span>退出</span></button>
      </div>
    </header>

    <main class="content">
      <section class="panel">
        <div class="panel-header file-panel-header">
          <div class="file-panel-title">
            <h2 id="currentFolderTitle">工号根目录</h2>
            <p id="folderBreadcrumb"></p>
          </div>
          <div id="selectionToolbar" class="selection-toolbar" aria-label="图纸操作">
            <span id="selectionCount" class="selection-count">未选择</span>
            <button id="bulkOpenButton" type="button" disabled><span class="btn-icon" aria-hidden="true">↗</span><span>打开</span></button>
            <button id="bulkRenameButton" type="button" disabled><span class="btn-icon" aria-hidden="true">✎</span><span>重命名</span></button>
            <button id="bulkCopyButton" type="button" disabled><span class="btn-icon" aria-hidden="true">⎘</span><span>复制</span></button>
            <button id="bulkCutButton" type="button" disabled><span class="btn-icon" aria-hidden="true">✂</span><span>剪切</span></button>
            <button id="bulkShareButton" type="button" disabled><span class="btn-icon" aria-hidden="true">⛓</span><span>分享</span></button>
            <button id="bulkInternalShareButton" type="button" disabled><span class="btn-icon" aria-hidden="true">↔</span><span>内部分享</span></button>
            <button id="bulkDownloadButton" type="button" disabled><span class="btn-icon" aria-hidden="true">↓</span><span>下载</span></button>
            <button id="bulkDeleteButton" class="danger" type="button" disabled><span class="btn-icon" aria-hidden="true">×</span><span>删除</span></button>
            <button id="clearSelectionButton" class="ghost" type="button" disabled aria-label="清空选择"><span class="btn-icon" aria-hidden="true">×</span></button>
          </div>
          <div id="status" class="status"></div>
        </div>
        <div class="file-browser">
          <aside class="folder-pane" aria-label="文件夹树">
            <div class="folder-pane-header">
              <strong>目录</strong>
              <span>工号空间</span>
            </div>
            <div id="folderTree" class="folder-tree"></div>
          </aside>
          <div class="file-pane">
            <div class="table-wrap">
              <table class="file-table">
                <thead>
                  <tr>
                    <th class="select-heading"><input id="selectAllFiles" class="select-all-checkbox" type="checkbox" aria-label="选择当前页所有图纸"></th>
                    <th>名称</th>
                    <th>类型</th>
                    <th>更新时间</th>
                    <th>大小</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="fileRows"></tbody>
              </table>
              <div id="emptyState" class="empty hidden">
                <div class="empty-mark" aria-hidden="true">▣</div>
                <strong>当前目录为空</strong>
                <span>新建图纸或文件夹开始整理。</span>
              </div>
            </div>
            <div class="pagination-bar" id="filePagination" aria-label="文件列表分页">
              <div id="paginationSummary" class="pagination-summary">当前目录为空</div>
              <div class="pagination-controls">
                <label class="page-size-control" for="pageSizeSelect">
                  <span>每页</span>
                  <select id="pageSizeSelect">
                    <option value="10">10</option>
                    <option value="25" selected>25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                  </select>
                </label>
                <button id="prevPageButton" type="button" aria-label="上一页"><span class="btn-icon" aria-hidden="true">‹</span></button>
                <span id="pageIndicator" class="page-indicator">第 1 / 1 页</span>
                <button id="nextPageButton" type="button" aria-label="下一页"><span class="btn-icon" aria-hidden="true">›</span></button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="panel internal-share-panel">
        <div class="panel-header">
          <h2>组织分享</h2>
          <div class="share-panel-tools">
            <button id="refreshInternalSharesButton" type="button"><span class="btn-icon" aria-hidden="true">↻</span><span>刷新消息</span></button>
            <div id="internalShareStatus" class="status"></div>
          </div>
        </div>
        <div class="internal-share-layout">
          <div class="internal-share-list" id="internalShareList"></div>
          <section class="internal-chat hidden" id="internalChat" aria-label="组织分享聊天">
            <header class="internal-chat-header">
              <div>
                <h3 id="internalChatTitle">选择一个分享</h3>
                <p id="internalChatMeta"></p>
              </div>
              <button id="openInternalShareButton" type="button"><span class="btn-icon" aria-hidden="true">↗</span><span>打开只读</span></button>
            </header>
            <div id="internalMessages" class="internal-messages"></div>
            <div class="internal-message-box">
              <textarea id="internalMessageInput" rows="3" maxlength="2000" placeholder="写一条消息给同事"></textarea>
              <button id="sendInternalMessageButton" class="primary" type="button"><span class="btn-icon" aria-hidden="true">↵</span><span>发送</span></button>
            </div>
          </section>
          <div id="internalShareEmpty" class="empty internal-share-empty">
            <div class="empty-mark" aria-hidden="true">↔</div>
            <strong>还没有组织分享</strong>
            <span>从文件列表里选择“内部分享”，同事登录后会在这里看到。</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <button id="aiEntryButton" class="ai-entry" type="button" aria-label="打开 AI 图表助手">
    <span aria-hidden="true">AI</span>
  </button>

  <section id="aiAssistant" class="ai-assistant hidden" aria-labelledby="aiAssistantTitle" aria-modal="true" role="dialog">
    <div class="ai-panel">
      <header class="ai-panel-header">
        <div class="ai-title-block">
          <div class="ai-mark" aria-hidden="true">AI</div>
          <div>
            <h2 id="aiAssistantTitle">AI 图表助手</h2>
            <p>生成可编辑 draw.io 图纸，支持流程图、泳道图、UML、ER 和架构图。</p>
          </div>
        </div>
        <div class="ai-panel-actions">
          <button id="aiProviderSettingsButton" class="ai-icon-button ai-settings-button" type="button" aria-label="模型设置" title="模型设置">
            <span aria-hidden="true">⚙</span>
          </button>
          <button id="aiCloseButton" class="ai-icon-button" type="button" aria-label="关闭 AI 图表助手">×</button>
        </div>
      </header>

      <div class="ai-panel-body">
        <section class="ai-workbench" aria-label="生成图表">
          <label class="ai-field">
            <span>图表类型</span>
            <select id="aiDiagramType">
              <option value="flowchart">流程图</option>
              <option value="swimlane">泳道图</option>
              <option value="sequence">UML 时序图</option>
              <option value="uml_class">UML 类图</option>
              <option value="erd">ER 图</option>
              <option value="architecture">架构图</option>
              <option value="c4">C4 架构图</option>
              <option value="general">通用关系图</option>
            </select>
          </label>

          <label class="ai-field">
            <span>提示词</span>
            <textarea id="aiPrompt" rows="8" maxlength="4000" placeholder="例如：为请假审批设计泳道图，包含员工提交、主管审批、人事备案、驳回修改和通知员工。"></textarea>
          </label>

          <div class="ai-prompt-bank" aria-label="提示词示例">
            <button type="button" data-ai-type="flowchart" data-ai-example="设计一个采购申请审批流程，包含提交申请、预算校验、部门负责人审批、财务复核、采购执行和归档。">采购流程</button>
            <button type="button" data-ai-type="swimlane" data-ai-example="生成客户售后工单泳道图，泳道包含客户、客服、技术支持、主管，流程包含受理、分派、处理、升级、客户确认和关闭。">售后泳道</button>
            <button type="button" data-ai-type="sequence" data-ai-example="生成用户登录的 UML 时序图，参与者包括用户、前端、认证服务、用户数据库，包含提交账号密码、校验、返回 token 和失败提示。">登录时序</button>
            <button type="button" data-ai-type="uml_class" data-ai-example="生成订单系统 UML 类图，包含 User、Order、OrderItem、Product、Payment，标出关键属性、方法和组合/关联关系。">订单类图</button>
            <button type="button" data-ai-type="erd" data-ai-example="生成文件管理系统 ER 图，实体包含 employees、files、folders、shares、sessions，标出主键、外键和关系。">文件 ER</button>
            <button type="button" data-ai-type="architecture" data-ai-example="生成公司内部 draw.io 工具架构图，包含浏览器、公司服务、draw.io 静态资源、员工数据目录、分享访问、AI 模型接口和导出服务。">系统架构</button>
          </div>

          <div class="ai-actions">
            <button id="aiGenerateButton" class="primary" type="button"><span class="btn-icon" aria-hidden="true">AI</span><span>生成并打开</span></button>
            <div id="aiCurrentConfig" class="ai-current-config" aria-live="polite"></div>
            <div id="aiStatus" class="ai-status" role="status" aria-live="polite"></div>
          </div>
          <div id="aiProgress" class="ai-progress hidden" aria-live="polite">
            <div class="ai-progress-track">
              <div id="aiProgressBar" class="ai-progress-bar"></div>
            </div>
            <div class="ai-progress-meta">
              <span id="aiProgressLabel">准备生成</span>
              <strong id="aiProgressValue">0%</strong>
            </div>
          </div>
        </section>
      </div>

      <section id="aiProviderSettings" class="ai-settings-page hidden" aria-label="模型提供商设置">
        <div class="ai-settings-panel">
          <header class="ai-settings-header">
            <div>
              <h3>模型设置</h3>
              <p>管理当前工号保存的提供商，测试连接后选择默认模型。</p>
            </div>
            <button id="aiSettingsCloseButton" class="ai-icon-button" type="button" aria-label="关闭模型设置">×</button>
          </header>

          <div class="ai-settings-body">
            <aside class="ai-provider-browser" aria-label="已保存提供商">
              <label class="ai-field">
                <span>默认提供商</span>
                <select id="aiProviderSelect">
                  <option value="">手动填写</option>
                </select>
              </label>

              <div class="ai-provider-browser-head">
                <strong>已保存提供商</strong>
                <button id="aiNewProviderButton" type="button"><span class="btn-icon" aria-hidden="true">+</span><span>新增提供商</span></button>
              </div>
              <div id="aiProviderList" class="ai-provider-list" aria-label="已保存提供商"></div>
            </aside>

            <section class="ai-settings-form" aria-label="提供商编辑">
              <div class="ai-settings-section-title">
                <strong>连接配置</strong>
                <span>保存后归当前工号使用</span>
              </div>

              <label class="ai-field">
                <span>名称</span>
                <input id="aiProviderName" type="text" maxlength="60" autocomplete="off" placeholder="例如：公司网关">
              </label>

              <label class="ai-field">
                <span>接口格式</span>
                <select id="aiProviderFormat">
                  <option value="openai">OpenAI 格式</option>
                  <option value="anthropic">Anthropic 格式</option>
                </select>
              </label>

              <label class="ai-field ai-setting-wide">
                <span>Base URL</span>
                <input id="aiBaseUrl" type="url" autocomplete="off">
              </label>

              <label class="ai-field ai-setting-wide">
                <span>API Key</span>
                <input id="aiApiKey" type="password" autocomplete="off" placeholder="保存在当前工号">
              </label>

              <div class="ai-model-picker">
                <label class="ai-field">
                  <span>模型</span>
                  <select id="aiModelSelect" disabled>
                    <option value="">填写 Base URL 和 API Key 后加载</option>
                  </select>
                </label>
                <button id="aiLoadModelsButton" type="button"><span class="btn-icon" aria-hidden="true">↻</span><span>测试并加载</span></button>
              </div>

              <label id="aiManualModelField" class="ai-field hidden">
                <span>手动模型名</span>
                <input id="aiModel" type="text" autocomplete="off" placeholder="模型无法加载时填写">
              </label>
              <div id="aiModelHint" class="ai-model-hint" role="status" aria-live="polite"></div>
              <div id="aiProviderHint" class="ai-model-hint" role="status" aria-live="polite"></div>

              <input id="aiTemperature" type="hidden" value="0.2">
              <input id="aiMaxTokens" type="hidden" value="2200">

            </section>
          </div>

          <footer class="ai-settings-footer">
            <div class="ai-settings-footnote">默认提供商会保存到当前工号，API Key 不会写入浏览器本地配置。</div>
            <div class="ai-settings-footer-actions">
              <div class="ai-provider-form-actions">
                <button id="aiSaveProviderButton" class="primary" type="button"><span class="btn-icon" aria-hidden="true">✓</span><span>保存提供商</span></button>
                <button id="aiDeleteProviderButton" class="danger" type="button" disabled><span class="btn-icon" aria-hidden="true">×</span><span>删除</span></button>
                <button id="aiCancelProviderEditButton" type="button">取消编辑</button>
              </div>
              <button id="aiSaveConfigButton" type="button"><span class="btn-icon" aria-hidden="true">✓</span><span>保存默认设置</span></button>
            </div>
          </footer>
        </div>
      </section>
    </div>
  </section>

  <section id="internalShareDialog" class="dialog-backdrop hidden" aria-labelledby="internalShareDialogTitle" aria-modal="true" role="dialog">
    <section class="dialog-panel internal-recipient-dialog">
      <button id="internalShareCloseButton" class="dialog-close" type="button" aria-label="关闭">×</button>
      <div class="dialog-header">
        <div class="dialog-kicker">组织分享</div>
        <h2 id="internalShareDialogTitle">选择同事</h2>
        <p id="internalShareDialogFile" class="dialog-message"></p>
      </div>
      <div class="dialog-body">
        <label class="dialog-label" for="internalRecipientSearch">搜索同事</label>
        <input id="internalRecipientSearch" class="dialog-input internal-recipient-search" type="search" autocomplete="off" placeholder="输入姓名或工号">
        <div id="internalSelectedRecipients" class="internal-selected-recipients" aria-live="polite"></div>
        <div id="internalRecipientList" class="internal-recipient-list" role="listbox" aria-label="同事列表"></div>
        <div id="internalRecipientHint" class="dialog-hint"></div>
        <label class="dialog-label internal-message-label" for="internalShareMessage">留言</label>
        <textarea id="internalShareMessage" class="internal-share-message" rows="4" maxlength="2000">请查看这张图纸。</textarea>
      </div>
      <div class="dialog-actions">
        <button id="internalShareCancelButton" class="dialog-secondary" type="button">取消</button>
        <button id="internalShareSendButton" class="dialog-primary" type="button">发送</button>
      </div>
    </section>
  </section>

      function setStatus(text, tone) {
        status.textContent = text || '';
        status.className = 'status' + (tone ? ' ' + tone : '');
      }

      function notify(text, tone) {
        if (window.CompanyToast) {
          CompanyToast.show({ message: text, tone: tone });
        }
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value).replace(/[&<>"']/g, function (ch) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
        });
      }

      function formatBytes(value) {
        var size = Number(value || 0);

        if (size < 1024) {
          return size + ' B';
        }

        if (size < 1024 * 1024) {
          return (size / 1024).toFixed(1) + ' KB';
        }

        return (size / 1024 / 1024).toFixed(1) + ' MB';
      }

      function formatDate(value) {
        if (!value) {
          return '-';
        }

        return new Intl.DateTimeFormat('zh-CN', {
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit'
        }).format(new Date(value));
      }

      function api(path, options) {
        return fetch(path, Object.assign({
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' }
        }, options || {})).then(function (res) {
          if (res.status === 401) {
            window.location.replace('/login.html?next=' + encodeURIComponent(window.location.pathname + window.location.search));
            return Promise.reject({ error: 'not_authenticated' });
          }

          return res.json().then(function (body) {
            if (!res.ok) {
              throw body;
            }

            return body;
          });
        });
      }

      function setInternalShareStatus(text, tone) {
        internalShareStatus.textContent = text || '';
        internalShareStatus.className = 'status' + (tone ? ' ' + tone : '');
      }

      function internalShareErrorText(err) {
        var code = err && err.error;
        var messages = {
          recipient_required: '请填写至少一个同事工号。',
          invalid_recipient: '收件人工号格式不正确。',
          too_many_recipients: '一次分享的同事太多，请拆成多次分享。',
          message_required: '请先输入消息。',
          internal_share_not_found: '这个内部分享不可用或无权限访问。',
          file_not_found: '原图纸不存在。'
        };

        return messages[code] || '组织分享操作失败，请稍后重试。';
      }

      function profileFromMap(profiles, employeeId) {
        return profiles && profiles[employeeId] ? profiles[employeeId] : {
          employeeId: employeeId,
          name: '',
          displayName: employeeId
        };
      }

      function displayEmployee(employeeId, profiles) {
        var profile = profileFromMap(profiles, employeeId);
        return profile.displayName || profile.name || employeeId;
      }

      function normalizeSearchText(value) {
        return String(value || '').toLowerCase().replace(/\s+/g, '');
      }

      function employeeSearchText(employee) {
        return [
          employee.employeeId,
          employee.employeeId ? '工号' + employee.employeeId : '',
          employee.name,
          employee.displayName
        ].join(' ');
      }

      function updateWhoami(profile) {
        currentEmployeeId = profile.employeeId || currentEmployeeId;
        currentProfileName = profile.name || '';
        currentDisplayName = profile.displayName || currentProfileName || currentEmployeeId;
        currentEmployeeProfile = {
          employeeId: currentEmployeeId,
          name: currentProfileName,
          displayName: currentDisplayName
        };
        whoami.textContent = currentProfileName ? currentDisplayName + ' · 工号 ' + currentEmployeeId : '工号 ' + currentEmployeeId;
      }

      function renderInternalMessages(messages) {
        internalMessages.innerHTML = '';
        var profiles = currentInternalShare && currentInternalShare.share ? currentInternalShare.share.profiles : {};

        (messages || []).forEach(function (message) {
          var item = document.createElement('div');
          var isMine = message.authorId === currentEmployeeId;
          var author = profileFromMap(profiles, message.authorId);
          var authorLabel = displayEmployee(message.authorId, profiles);
          var authorMeta = author.name ? '工号 ' + author.employeeId : '未设置姓名';
          item.className = 'internal-message' + (isMine ? ' mine' : '');
          item.innerHTML = [
            '<div class="internal-message-meta">',
            '<strong>' + escapeHtml(authorLabel) + '</strong>',
            '<em>' + escapeHtml(authorMeta) + '</em>',
            '<span>' + escapeHtml(formatDate(message.createdAt)) + '</span>',
            '</div>',
            '<div class="internal-message-text">' + escapeHtml(message.text) + '</div>'
          ].join('');
          internalMessages.appendChild(item);
        });

        internalMessages.scrollTop = internalMessages.scrollHeight;
      }

      function renderInternalShares(shares) {
        internalShareList.innerHTML = '';
        internalShareEmpty.classList.toggle('hidden', shares.length > 0);

        shares.forEach(function (share) {
          var card = document.createElement('button');
          var profiles = share.profiles || {};
          var participants = (share.participants || []).filter(function (id) {
            return id !== currentEmployeeId;
          }).map(function (id) {
            return displayEmployee(id, profiles);
          });
          var ownerName = displayEmployee(share.ownerId, profiles);
          var unreadCount = Number(share.unreadCount || 0);
          var unreadBadge = unreadCount > 0 ?
            '<span class="internal-unread-badge" aria-label="' + escapeHtml(unreadCount + ' 条未读消息') + '">' + escapeHtml(unreadCount > 99 ? '99+' : unreadCount) + '</span>' :
            '';
          card.type = 'button';
          card.className = 'internal-share-card' +
            (currentInternalShare && currentInternalShare.share.id === share.id ? ' active' : '') +
            (unreadCount > 0 ? ' has-unread' : '');
          card.innerHTML = [
            '<div class="internal-share-card-title"><strong>' + escapeHtml(share.file ? share.file.name : '图纸已删除') + '</strong>' + unreadBadge + '</div>',
            '<span>' + escapeHtml(share.direction === 'sent' ? '我分享给 ' + (participants.join(', ') || '同事') : ownerName + ' 分享给我') + '</span>',
            '<small>' + escapeHtml(share.lastMessage ? share.lastMessage.text : '') + '</small>'
          ].join('');
          card.addEventListener('click', function () {
            openInternalShare(share.id);
          });
          internalShareList.appendChild(card);
        });
      }

      function loadInternalShares() {
        setInternalShareStatus('正在加载');
        refreshInternalSharesButton.disabled = true;

        return api('/api/internal-shares')
          .then(function (body) {
            var shares = body.shares || [];
            var unreadTotal = shares.reduce(function (total, share) {
              return total + Number(share.unreadCount || 0);
            }, 0);
            renderInternalShares(shares);
            setInternalShareStatus(shares.length + ' 个会话' + (unreadTotal ? ' · ' + unreadTotal + ' 条未读' : ''), unreadTotal ? 'warn' : 'ok');
          })
          .catch(function (err) {
            if (!err || err.error !== 'not_authenticated') {
              setInternalShareStatus('加载失败', 'error');
            }
          })
          .finally(function () {
            refreshInternalSharesButton.disabled = false;
          });
      }

      function openInternalShare(shareId) {
        setInternalShareStatus('正在打开');

        return api('/api/internal-shares/' + encodeURIComponent(shareId))
          .then(function (body) {
            currentInternalShare = body;
            internalChat.classList.remove('hidden');
            internalChatTitle.textContent = body.share.file.name;
            internalChatMeta.textContent = '参与人 ' + (body.share.participants || []).map(function (id) {
              return displayEmployee(id, body.share.profiles || {});
            }).join(', ');
            renderInternalMessages(body.messages || []);
            setInternalShareStatus('已打开', 'ok');
            return loadInternalShares();
          })
          .catch(function (err) {
            if (!err || err.error !== 'not_authenticated') {
              var message = internalShareErrorText(err);
              setInternalShareStatus(message, 'error');
              notify(message, 'error');
            }
          });
      }

      function sendInternalMessage() {
        if (!currentInternalShare) {
          return;
        }

        var text = internalMessageInput.value.trim();

        if (!text) {
          internalMessageInput.focus();
          return;
        }

        sendInternalMessageButton.disabled = true;

        api('/api/internal-shares/' + encodeURIComponent(currentInternalShare.share.id) + '/messages', {
          method: 'POST',
          body: JSON.stringify({ message: text })
        })
          .then(function (body) {
            currentInternalShare.messages = body.messages || [];
            currentInternalShare.share = body.share;
            internalMessageInput.value = '';
            renderInternalMessages(currentInternalShare.messages);
            return loadInternalShares();
          })
          .catch(function (err) {
            var message = internalShareErrorText(err);
            notify(message, 'error');
          })
          .finally(function () {
            sendInternalMessageButton.disabled = false;
          });
      }

      function openInternalShareViewer() {
        if (!currentInternalShare) {
          return;
        }

        window.open('/share.html?internalShare=' + encodeURIComponent(currentInternalShare.share.id), '_blank');
      }

      function shareFileInternal(file) {
        CompanyDialog.prompt({
          title: '内部分享',
          label: '同事工号',
          placeholder: '多个工号用逗号或空格分隔',
          confirmText: '下一步',
          requiredText: '请输入同事工号'
        }).then(function (recipients) {
          if (recipients == null) {
            return;
          }

          CompanyDialog.prompt({
            title: '留言',
            label: '给同事的话',
            value: '请查看这张图纸。',
            confirmText: '发送',
            requiredText: '请输入留言'
          }).then(function (message) {
            if (message == null) {
              return;
            }

            api('/api/files/' + encodeURIComponent(file.id) + '/share-internal', {
              method: 'POST',
              body: JSON.stringify({ recipients: recipients, message: message })
            })
              .then(function (body) {
                notify('已分享给组织内同事。', 'ok');
                currentInternalShare = { share: body.share, messages: body.messages || [] };
                return openInternalShare(body.share.id);
              })
              .catch(function (err) {
                var text = internalShareErrorText(err);
                notify(text, 'error');
                setInternalShareStatus(text, 'error');
              });
          });
        });
      }

      function closeInternalShareDialog() {
        internalShareDialog.classList.remove('is-visible');
        window.setTimeout(function () {
          internalShareDialog.classList.add('hidden');
        }, 160);
        internalShareTargetFile = null;
      }

      function selectedInternalRecipients() {
        return Array.from(selectedInternalEmployeeIds);
      }

      function updateRecipientHint(filteredCount, selfMatched) {
        if (!internalEmployees.length) {
          internalRecipientHint.textContent = selfMatched ? '这是当前账号，内部分享需要选择其他同事。' : '暂无可选同事。请让同事先登录一次，系统会自动记录工号。';
          internalRecipientHint.className = 'dialog-hint warn';
          internalShareSendButton.disabled = true;
          return;
        }

        if (selfMatched && filteredCount === 1) {
          internalRecipientHint.textContent = '这是当前账号，内部分享需要选择其他同事。';
          internalRecipientHint.className = 'dialog-hint warn';
        } else if (!filteredCount) {
          internalRecipientHint.textContent = '没有找到匹配的同事。可以搜索姓名或工号。';
          internalRecipientHint.className = 'dialog-hint warn';
        } else if (selectedInternalEmployeeIds.size) {
          internalRecipientHint.textContent = '已选择 ' + selectedInternalEmployeeIds.size + ' 位同事。';
          internalRecipientHint.className = 'dialog-hint ok';
        } else {
          internalRecipientHint.textContent = '搜索姓名或工号，然后勾选一个或多个同事。';
          internalRecipientHint.className = 'dialog-hint';
        }

        internalShareSendButton.disabled = selectedInternalEmployeeIds.size === 0;
      }

      function renderSelectedRecipients() {
        internalSelectedRecipients.innerHTML = '';

        Array.from(selectedInternalEmployeeIds).forEach(function (employeeId) {
          var employee = internalEmployees.find(function (item) {
            return item.employeeId === employeeId;
          }) || { employeeId: employeeId, displayName: employeeId };
          var chip = document.createElement('button');
          chip.type = 'button';
          chip.className = 'internal-recipient-chip';
          chip.setAttribute('data-remove-recipient', employeeId);
          chip.innerHTML = '<span>' + escapeHtml(employee.displayName || employee.employeeId) + '</span><b aria-hidden="true">×</b>';
          internalSelectedRecipients.appendChild(chip);
        });
      }

      function renderEmployeeOptions(employees) {
        var query = normalizeSearchText(internalRecipientSearch.value);
        internalEmployees = (employees || []).slice().sort(function (a, b) {
          return (a.displayName || a.employeeId).localeCompare(b.displayName || b.employeeId, 'zh-CN');
        });
        var filtered = internalEmployees.filter(function (employee) {
          return !query || normalizeSearchText(employeeSearchText(employee)).indexOf(query) !== -1;
        });
        var selfMatched = query &&
          currentEmployeeProfile &&
          normalizeSearchText(employeeSearchText(currentEmployeeProfile)).indexOf(query) !== -1 &&
          !internalEmployees.some(function (employee) {
            return employee.employeeId === currentEmployeeId;
          });

        internalRecipientList.innerHTML = '';
        renderSelectedRecipients();

        if (selfMatched) {
          var selfOption = document.createElement('div');
          var selfPrimary = currentProfileName ? currentDisplayName : '工号 ' + currentEmployeeId;
          var selfSecondary = currentProfileName ? '工号 ' + currentEmployeeId + ' · 当前账号，不能选择' : '当前账号，不能选择';
          selfOption.className = 'internal-recipient-option is-disabled';
          selfOption.innerHTML = [
            '<span class="internal-recipient-lock" aria-hidden="true">–</span>',
            '<span class="internal-recipient-copy">',
            '<strong>' + escapeHtml(selfPrimary) + '</strong>',
            '<small>' + escapeHtml(selfSecondary) + '</small>',
            '</span>'
          ].join('');
          internalRecipientList.appendChild(selfOption);
        }

        filtered.forEach(function (employee) {
          var id = 'internal-recipient-' + employee.employeeId.replace(/[^A-Za-z0-9_-]/g, '-');
          var option = document.createElement('label');
          var primaryText = employee.name ? (employee.displayName || employee.name) : '工号 ' + employee.employeeId;
          var secondaryText = employee.name ? '工号 ' + employee.employeeId : '';
          option.className = 'internal-recipient-option';
          option.setAttribute('for', id);
          option.innerHTML = [
            '<input id="' + escapeHtml(id) + '" type="checkbox" value="' + escapeHtml(employee.employeeId) + '"' + (selectedInternalEmployeeIds.has(employee.employeeId) ? ' checked' : '') + '>',
            '<span class="internal-recipient-copy">',
            '<strong>' + escapeHtml(primaryText) + '</strong>',
            secondaryText ? '<small>' + escapeHtml(secondaryText) + '</small>' : '',
            '</span>'
          ].join('');
          internalRecipientList.appendChild(option);
        });

        updateRecipientHint(filtered.length + (selfMatched ? 1 : 0), selfMatched);
      }

      function openInternalShareDialog(file) {
        internalShareTargetFile = file;
        internalShareDialogFile.textContent = file.name;
        internalRecipientHint.textContent = '正在加载同事';
        internalRecipientHint.className = 'dialog-hint';
        internalEmployees = [];
        selectedInternalEmployeeIds = new Set();
        internalRecipientSearch.value = '';
        internalRecipientList.innerHTML = '';
        internalSelectedRecipients.innerHTML = '';
        internalShareMessage.value = '请查看这张图纸。';
        internalShareSendButton.disabled = true;
        internalShareDialog.classList.remove('hidden');
        window.setTimeout(function () {
          internalShareDialog.classList.add('is-visible');
        }, 0);

        api('/api/employees')
          .then(function (body) {
            renderEmployeeOptions(body.employees || []);
            internalRecipientSearch.focus();
          })
          .catch(function (err) {
            if (!err || err.error !== 'not_authenticated') {
              internalRecipientHint.textContent = '同事加载失败，请稍后重试。';
              internalRecipientHint.className = 'dialog-hint error';
            }
          });
      }

      function sendInternalShare() {
        if (!internalShareTargetFile) {
          return;
        }

        var recipients = selectedInternalRecipients();

        if (!recipients.length) {
          internalRecipientHint.textContent = '请选择至少一个同事。';
          internalRecipientHint.className = 'dialog-hint error';
          internalRecipientSearch.focus();
          return;
        }

        internalShareSendButton.disabled = true;

        api('/api/files/' + encodeURIComponent(internalShareTargetFile.id) + '/share-internal', {
          method: 'POST',
          body: JSON.stringify({ recipients: recipients, message: internalShareMessage.value })
        })
          .then(function (body) {
            notify('已分享给组织内同事。', 'ok');
            closeInternalShareDialog();
            currentInternalShare = { share: body.share, messages: body.messages || [] };
            return openInternalShare(body.share.id);
          })
          .catch(function (err) {
            var text = internalShareErrorText(err);
            internalRecipientHint.textContent = text;
            internalRecipientHint.className = 'dialog-hint error';
            notify(text, 'error');
            setInternalShareStatus(text, 'error');
          })
          .finally(function () {
            updateRecipientHint(internalRecipientList.children.length);
          });
      }

      function shareFileInternal(file) {
        openInternalShareDialog(file);
      }

      function providerDefaultBaseUrl(format) {
        return format === 'anthropic' ? 'https://api.anthropic.com/v1' : 'https://api.openai.com/v1';
      }

      function setAiStatus(text, tone) {
        aiStatus.textContent = text || '';
        aiStatus.className = 'ai-status' + (tone ? ' ' + tone : '');
      }

      function setAiProgress(percent, label) {
        aiProgressPercent = Math.max(0, Math.min(100, Math.round(percent || 0)));
        aiProgressBar.style.width = aiProgressPercent + '%';
        aiProgressValue.textContent = aiProgressPercent + '%';

        if (label) {
          aiProgressLabel.textContent = label;
        }
      }

      function startAiProgress(label) {
        window.clearInterval(aiProgressTimer);
        aiProgress.classList.remove('hidden');
        setAiProgress(8, label || '准备生成');
        aiProgressTimer = window.setInterval(function () {
          var ceiling = aiProgressPercent < 45 ? 68 : 88;

          if (aiProgressPercent < ceiling) {
            setAiProgress(aiProgressPercent + (aiProgressPercent < 45 ? 3 : 1));
          }
        }, 520);
      }

      function advanceAiProgress(percent, label) {
        setAiProgress(Math.max(aiProgressPercent, percent), label);
      }

      function finishAiProgress(label) {
        window.clearInterval(aiProgressTimer);
        aiProgressTimer = null;
        setAiProgress(100, label || '已完成');
      }

      function stopAiProgress(label, tone) {
        window.clearInterval(aiProgressTimer);
        aiProgressTimer = null;

        if (label) {
          aiProgressLabel.textContent = label;
        }

        aiProgress.classList.toggle('error', tone === 'error');
      }

      function resetAiProgress() {
        window.clearInterval(aiProgressTimer);
        aiProgressTimer = null;
        aiProgress.classList.add('hidden');
        aiProgress.classList.remove('error');
        setAiProgress(0, '准备生成');
      }

      function setAiModelHint(text, tone) {
        aiModelHint.textContent = text || '';
        aiModelHint.className = 'ai-model-hint' + (tone ? ' ' + tone : '');
      }

      function setAiProviderHint(text, tone) {
        aiProviderHint.textContent = text || '';
        aiProviderHint.className = 'ai-model-hint' + (tone ? ' ' + tone : '');
      }

      function setAiManualModelVisible(visible) {
        aiManualModelField.classList.toggle('hidden', !visible);
      }

      function resetAiModelOptions(message, selectedModel, options) {
        var keepManualModelVisible = options && options.keepManualModelVisible;
        aiModelSelect.innerHTML = '';
        var option = document.createElement('option');
        option.value = selectedModel || '';
        option.textContent = selectedModel || message || '加载模型后选择';
        aiModelSelect.appendChild(option);
        aiModelSelect.disabled = !selectedModel;
        aiModelSelect.value = selectedModel || '';

        if (!keepManualModelVisible) {
          setAiManualModelVisible(false);
        }

        updateAiCurrentConfig();
      }

      function populateAiModels(models, selectedModel) {
        var preferredModel = selectedModel || aiModel.value.trim();
        var hasPreferred = false;
        aiModelSelect.innerHTML = '';

        (models || []).forEach(function (model) {
          var option = document.createElement('option');
          option.value = model.id;
          option.textContent = model.label && model.label !== model.id ? model.label + ' · ' + model.id : model.id;
          aiModelSelect.appendChild(option);

          if (model.id === preferredModel) {
            hasPreferred = true;
          }
        });

        if (preferredModel && !hasPreferred) {
          var manualOption = document.createElement('option');
          manualOption.value = preferredModel;
          manualOption.textContent = preferredModel + ' · 当前填写';
          aiModelSelect.insertBefore(manualOption, aiModelSelect.firstChild);
        }

        aiModelSelect.disabled = aiModelSelect.options.length === 0;

        if (!aiModelSelect.disabled) {
          aiModelSelect.value = preferredModel || aiModelSelect.options[0].value;
          aiModel.value = aiModelSelect.value;
        }

        setAiManualModelVisible(false);
        updateAiCurrentConfig();
      }

      function markAiModelsStale() {
        resetAiModelOptions('配置已变化，请重新加载模型', aiModel.value.trim());
        setAiModelHint('配置已变化，请重新加载模型', 'warn');
        scheduleAiConfigSave();
      }

      function collectAiConfig() {
        return {
          providerId: aiProviderSelect.value || '',
          providerFormat: aiProviderFormat.value,
          baseUrl: aiBaseUrl.value.trim(),
          model: (aiModel.value || aiModelSelect.value).trim(),
          apiKey: aiApiKey.value.trim(),
          temperature: aiTemperature.value,
          maxTokens: aiMaxTokens.value,
          diagramType: aiDiagramType.value
        };
      }

      function collectAiLocalConfig() {
        var config = collectAiConfig();
        delete config.apiKey;
        return config;
      }

      function aiProviderById(providerId) {
        return aiProviders.find(function (provider) {
          return provider.id === providerId;
        }) || null;
      }

      function aiProviderLabel(provider) {
        if (!provider) {
          return '手动填写';
        }

        return provider.name || provider.model || (provider.providerFormat === 'anthropic' ? 'Anthropic' : 'OpenAI');
      }

      function updateAiCurrentConfig() {
        if (!aiCurrentConfig) {
          return;
        }

        var provider = aiProviderById(aiProviderSelect.value);
        var providerText = provider ? aiProviderLabel(provider) : '手动配置';
        var modelText = (aiModel.value || aiModelSelect.value || '').trim() || '未选择模型';

        aiCurrentConfig.innerHTML = [
          '<span>当前模型</span>',
          '<strong>' + escapeHtml(providerText) + '</strong>',
          '<small>' + escapeHtml(modelText) + '</small>'
        ].join('');
      }

      function updateAiProvidersFromBody(body, preferredProviderId) {
        aiProviders = Array.isArray(body && body.providers) ? body.providers : [];
        renderAiProviderSelect(preferredProviderId || (body && body.selectedProviderId) || aiProviderSelect.value);
        renderAiProviderList();
        updateAiCurrentConfig();
      }

      function renderAiProviderSelect(preferredProviderId) {
        var selectedId = preferredProviderId || '';
        var selectedProvider = selectedId ? aiProviderById(selectedId) : null;
        aiProviderSelect.innerHTML = '';

        var manualOption = document.createElement('option');
        manualOption.value = '';
        manualOption.textContent = '手动填写';
        aiProviderSelect.appendChild(manualOption);

        aiProviders.forEach(function (provider) {
          var option = document.createElement('option');
          option.value = provider.id;
          option.textContent = aiProviderLabel(provider);
          aiProviderSelect.appendChild(option);
        });

        aiProviderSelect.value = selectedProvider ? selectedProvider.id : '';
        updateAiCurrentConfig();
      }

      function renderAiProviderList() {
        aiProviderList.innerHTML = '';

        if (!aiProviders.length) {
          var empty = document.createElement('div');
          empty.className = 'ai-provider-empty';
          empty.textContent = '还没有保存的提供商';
          aiProviderList.appendChild(empty);
          return;
        }

        aiProviders.forEach(function (provider) {
          var item = document.createElement('div');
          item.className = 'ai-provider-item' + (provider.id === aiProviderSelect.value ? ' is-selected' : '');
          item.setAttribute('data-provider-id', provider.id);
          item.innerHTML = [
            '<button class="ai-provider-main" type="button" data-provider-select="' + escapeHtml(provider.id) + '">',
            '<strong>' + escapeHtml(aiProviderLabel(provider)) + '</strong>',
            '<span>' + escapeHtml(provider.model || provider.baseUrl || '未填写模型') + '</span>',
            '</button>',
            '<button type="button" data-provider-edit="' + escapeHtml(provider.id) + '">编辑</button>'
          ].join('');
          aiProviderList.appendChild(item);
        });
      }

      function applyAiProvider(provider) {
        if (!provider) {
          aiProviderSelect.value = '';
          aiApiKey.placeholder = '可在设置里添加到工号';
          persistAiConfig();
          renderAiProviderList();
          updateAiCurrentConfig();
          return;
        }

        aiProviderSelect.value = provider.id;
        aiProviderFormat.value = provider.providerFormat === 'anthropic' ? 'anthropic' : 'openai';
        lastAiProviderFormat = aiProviderFormat.value;
        aiBaseUrl.value = provider.baseUrl || providerDefaultBaseUrl(aiProviderFormat.value);
        aiModel.value = provider.model || '';
        resetAiModelOptions('加载模型后选择', provider.model || '');
        setAiManualModelVisible(false);
        setAiModelHint(provider.model ? '已选择 ' + provider.model : '可加载模型列表后选择');
        aiApiKey.value = '';
        aiApiKey.placeholder = provider.hasApiKey ? '已保存在工号中，留空使用已保存 Key' : '尚未保存 API Key';
        aiTemperature.value = provider.temperature || '0.2';
        aiMaxTokens.value = provider.maxTokens || '2200';
        persistAiConfig();
        renderAiProviderList();
        updateAiCurrentConfig();
      }

      function resetAiProviderEdit() {
        editingAiProviderId = '';
        aiProviderName.value = '';
        aiDeleteProviderButton.disabled = true;
        setAiProviderHint('', '');
      }

      function editAiProvider(provider) {
        if (!provider) {
          return;
        }

        editingAiProviderId = provider.id;
        aiProviderName.value = provider.name || '';
        aiDeleteProviderButton.disabled = false;
        aiProviderSettings.classList.remove('hidden');
        applyAiProvider(provider);
        setAiProviderHint('正在编辑 ' + aiProviderLabel(provider));
        aiProviderName.focus();
      }

      function startNewAiProvider() {
        editingAiProviderId = '';
        aiProviderSelect.value = '';
        aiProviderName.value = '';
        aiProviderFormat.value = 'openai';
        lastAiProviderFormat = aiProviderFormat.value;
        aiBaseUrl.value = providerDefaultBaseUrl('openai');
        aiModel.value = '';
        resetAiModelOptions('填写 Base URL 和 API Key 后加载', '');
        setAiManualModelVisible(false);
        aiApiKey.value = '';
        aiApiKey.placeholder = '保存后归当前工号使用';
        aiTemperature.value = '0.2';
        aiMaxTokens.value = '2200';
        aiDeleteProviderButton.disabled = true;
        setAiProviderHint('填写配置后保存为提供商');
        renderAiProviderList();
        aiProviderName.focus();
      }

      function currentAiProviderPayload() {
        return {
          name: aiProviderName.value.trim(),
          providerFormat: aiProviderFormat.value,
          baseUrl: aiBaseUrl.value.trim(),
          model: (aiModel.value || aiModelSelect.value).trim(),
          apiKey: aiApiKey.value.trim(),
          temperature: aiTemperature.value,
          maxTokens: aiMaxTokens.value
        };
      }

      function saveAiProvider() {
        var payload = currentAiProviderPayload();

        if (!payload.baseUrl) {
          setAiProviderHint('请先填写 Base URL', 'error');
          aiBaseUrl.focus();
          return;
        }

        aiSaveProviderButton.disabled = true;
        setAiProviderHint(editingAiProviderId ? '正在更新提供商' : '正在保存提供商');

        api(editingAiProviderId ? '/api/ai/providers/' + encodeURIComponent(editingAiProviderId) : '/api/ai/providers', {
          method: editingAiProviderId ? 'PUT' : 'POST',
          body: JSON.stringify(payload)
        })
          .then(function (body) {
            var provider = body.provider || null;
            updateAiProvidersFromBody(body, provider && provider.id);

            if (provider) {
              editingAiProviderId = provider.id;
              aiProviderName.value = provider.name || '';
              aiDeleteProviderButton.disabled = false;
              applyAiProvider(provider);
            }

            setAiProviderHint('提供商已保存到当前工号', 'ok');
            setAiStatus('提供商已保存', 'ok');
            notify('AI 提供商已保存。', 'ok');
          })
          .catch(function (err) {
            var message = aiErrorText(err);
            setAiProviderHint(message, 'error');
            notify(message, 'error');
          })
          .finally(function () {
            aiSaveProviderButton.disabled = false;
          });
      }

      function deleteAiProvider() {
        var provider = aiProviderById(editingAiProviderId || aiProviderSelect.value);

        if (!provider) {
          return;
        }

        CompanyDialog.confirm({
          title: '删除提供商',
          message: '确定删除“' + aiProviderLabel(provider) + '”？',
          confirmText: '删除',
          cancelText: '保留',
          danger: true
        }).then(function (confirmed) {
          if (!confirmed) {
            return;
          }

          aiDeleteProviderButton.disabled = true;
          api('/api/ai/providers/' + encodeURIComponent(provider.id), { method: 'DELETE' })
            .then(function (body) {
              updateAiProvidersFromBody(body, body.selectedProviderId);
              resetAiProviderEdit();

              if (body.selectedProviderId) {
                applyAiProvider(aiProviderById(body.selectedProviderId));
              } else {
                startNewAiProvider();
              }

              setAiProviderHint('提供商已删除', 'ok');
              notify('AI 提供商已删除。', 'ok');
            })
            .catch(function (err) {
              aiDeleteProviderButton.disabled = false;
              var message = aiErrorText(err);
              setAiProviderHint(message, 'error');
              notify(message, 'error');
            });
        });
      }

      function saveAiProviderSelection(providerId) {
        if (!aiProvidersLoaded) {
          persistAiConfig();
          return Promise.resolve();
        }

        return api('/api/ai/providers/selection', {
          method: 'PUT',
          body: JSON.stringify({ providerId: providerId || '' })
        }).then(function (body) {
          updateAiProvidersFromBody(body, providerId || '');
          persistAiConfig();
        });
      }

      function loadAiProviders() {
        return api('/api/ai/providers')
          .then(function (body) {
            aiProvidersLoaded = true;
            var localConfig = {};

            try {
              localConfig = JSON.parse(localStorage.getItem(aiStorageKey) || '{}');
            } catch (_err) {
              localConfig = {};
            }

            updateAiProvidersFromBody(body, body.selectedProviderId || localConfig.providerId || '');

            if (aiProviderSelect.value) {
              applyAiProvider(aiProviderById(aiProviderSelect.value));
            } else {
              renderAiProviderList();
            }
          })
          .catch(function (err) {
            if (!err || err.error !== 'not_authenticated') {
              setAiProviderHint('提供商列表加载失败', 'error');
            }
          });
      }

      function loadAiConfig() {
        var config = {
          providerId: '',
          providerFormat: 'openai',
          baseUrl: providerDefaultBaseUrl('openai'),
          model: '',
          apiKey: '',
          temperature: '0.2',
          maxTokens: '2200',
          diagramType: 'flowchart'
        };

        try {
          config = Object.assign(config, JSON.parse(localStorage.getItem(aiStorageKey) || '{}'));
        } catch (_err) {
          // Ignore a corrupt browser-side config and fall back to defaults.
        }

        aiProviderFormat.value = config.providerFormat === 'anthropic' ? 'anthropic' : 'openai';
        aiDiagramType.value = config.diagramType || 'flowchart';
        aiBaseUrl.value = config.baseUrl || providerDefaultBaseUrl(aiProviderFormat.value);
        aiModel.value = config.model || '';
        resetAiModelOptions('填写 Base URL 和 API Key 后加载', config.model || '');
        setAiModelHint(config.model ? '已使用保存的模型名，可重新加载模型列表' : '');
        setAiManualModelVisible(false);
        aiApiKey.value = config.apiKey || '';
        aiTemperature.value = config.temperature || '0.2';
        aiMaxTokens.value = config.maxTokens || '2200';
        updateAiCurrentConfig();
      }

      function persistAiConfig() {
        try {
          localStorage.setItem(aiStorageKey, JSON.stringify(collectAiLocalConfig()));
          return true;
        } catch (_err) {
          return false;
        }
      }

      function scheduleAiConfigSave() {
        window.clearTimeout(aiSaveConfigTimer);
        aiSaveConfigTimer = window.setTimeout(function () {
          persistAiConfig();
        }, 250);
      }

      function saveAiConfig() {
        if (!persistAiConfig()) {
          setAiStatus('配置保存失败', 'error');
          notify('AI 配置保存失败，请检查浏览器存储权限。', 'error');
          return;
        }

        aiSaveConfigButton.disabled = true;
        saveAiProviderSelection(aiProviderSelect.value)
          .then(function () {
            if (aiProviderSelect.value) {
              setAiStatus('默认提供商已保存到当前工号', 'ok');
              notify('默认 AI 提供商已保存。', 'ok');
            } else {
              setAiStatus('手动配置已保存', 'ok');
              notify('手动 AI 配置已保存。', 'ok');
            }
          })
          .catch(function (err) {
            var message = aiErrorText(err);
            setAiStatus(message, 'error');
            notify(message, 'error');
          })
          .finally(function () {
            aiSaveConfigButton.disabled = false;
          });
      }

      function loadAiModels() {
        var baseUrl = aiBaseUrl.value.trim();
        var apiKey = aiApiKey.value.trim();
        var selectedProvider = aiProviderById(aiProviderSelect.value);
        var hasSavedApiKey = selectedProvider && selectedProvider.hasApiKey;

        if (!baseUrl) {
          setAiModelHint('请先填写 Base URL', 'error');
          setAiStatus('请先填写 Base URL', 'error');
          aiBaseUrl.focus();
          return;
        }

        if (!apiKey && !hasSavedApiKey) {
          setAiModelHint('请先填写 API Key', 'error');
          setAiStatus('请先填写 API Key', 'error');
          aiApiKey.focus();
          return;
        }

        persistAiConfig();
        aiLoadModelsButton.disabled = true;
        aiModelSelect.disabled = true;
        setAiModelHint('正在加载模型');
        setAiStatus('正在加载模型列表');

        api('/api/ai/models', {
          method: 'POST',
          body: JSON.stringify({
            config: collectAiConfig()
          })
        })
          .then(function (body) {
            populateAiModels(body.models || [], aiModel.value.trim());
            scheduleAiConfigSave();
            setAiModelHint('已加载 ' + (body.models || []).length + ' 个模型', 'ok');
            setAiStatus('模型列表已加载', 'ok');
            notify('模型列表已加载。', 'ok');
          })
          .catch(function (err) {
            if (!err || err.error !== 'not_authenticated') {
              var message = aiModelLoadErrorText(err);
              resetAiModelOptions('加载失败，可手动填写模型名', aiModel.value.trim());
              setAiManualModelVisible(true);
              setAiModelHint(message, 'error');
              setAiStatus(message, 'error');
              notify(message, 'error');
            }
          })
          .finally(function () {
            aiLoadModelsButton.disabled = false;
          });
      }

      function openAiPanel() {
        aiAssistant.classList.remove('hidden');
        window.setTimeout(function () {
          aiPrompt.focus();
        }, 0);
      }

      function closeAiPanel() {
        closeAiSettings();
        resetAiProgress();
        aiAssistant.classList.add('hidden');
      }

      function openAiSettings() {
        aiProviderSettings.classList.remove('hidden');
        renderAiProviderList();
        updateAiCurrentConfig();

        window.setTimeout(function () {
          if (aiProviderSelect.value) {
            aiProviderSelect.focus();
          } else {
            aiProviderName.focus();
          }
        }, 0);
      }

      function closeAiSettings() {
        aiProviderSettings.classList.add('hidden');
      }

      function aiErrorText(err) {
        var code = err && err.error;
        var safeMessage = sanitizeAiMessage(err && err.message, '');
        var messages = {
          prompt_required: '请先输入提示词。',
          prompt_too_large: '提示词太长，请压缩到 4000 字以内。',
          ai_api_key_required: '请填写 API Key，或在服务端配置 AI 环境变量。',
          ai_model_required: '请填写模型名称，或在服务端配置默认模型。',
          invalid_ai_base_url: 'Base URL 格式不正确。',
          unsupported_ai_provider: '暂不支持这个接口格式。',
          ai_provider_timeout: '模型接口响应超时。',
          ai_provider_unreachable: '无法连接模型接口。',
          ai_provider_auth_failed: 'API Key 无效或不属于这个 Base URL，请重新复制服务商后台的密钥。',
          ai_provider_error: safeMessage || '模型接口返回错误，请检查 Base URL、API Key 和模型名。',
          ai_provider_non_json: '模型接口返回了网页而不是 JSON，请检查 Base URL 是否是 API 地址。',
          ai_models_empty: '没有从接口加载到可用模型，可手动填写模型名。',
          ai_diagram_too_small: '模型返回的图表内容太少，请补充更多实体、步骤或组件后重试。',
          ai_flowchart_too_small: '模型返回的流程节点太少，请补充更多步骤后重试。',
          ai_provider_not_found: '这个提供商不存在或已删除。',
          invalid_ai_provider_id: '提供商标识不正确。',
          too_many_ai_providers: '保存的提供商太多，请先删除不用的提供商。',
          ai_api_key_too_large: 'API Key 太长，请检查后重新填写。',
          ai_response_not_json: '模型返回内容不是可解析的图表结构。',
          ai_invalid_response: '模型返回内容不完整。'
        };

        return messages[code] || '生成失败，请检查模型配置后重试。';
      }

      function sanitizeAiMessage(message, fallback) {
        var text = String(message || '').replace(/\s+/g, ' ').trim();

        if (!text) {
          return fallback || '';
        }

        if (/<!doctype\s+html|<html[\s>]|<head[\s>]|<body[\s>]|\/_next\/static/i.test(text)) {
          return fallback || '';
        }

        return text.slice(0, 160);
      }

      function aiModelLoadErrorText(err) {
        if (err && (err.error === 'ai_provider_non_json' || err.providerStatus === 404)) {
          return '这个服务没有开放模型列表，请手动填写模型名后直接生成。';
        }

        return aiErrorText(err);
      }

      function diagramNameFromTitle(title, typeLabel) {
        var name = String(title || ('AI ' + (typeLabel || '图表')))
          .replace(/[\\/:*?"<>|\u0000-\u001f]/g, '-')
          .replace(/\s+/g, ' ')
          .trim();

        if (!name) {
          name = 'AI ' + (typeLabel || '图表');
        }

        return /\.drawio$/i.test(name) ? name : name + '.drawio';
      }

      function generateDiagram() {
        var prompt = aiPrompt.value.trim();
        var diagramType = aiDiagramType.value || 'flowchart';

        if (!prompt) {
          setAiStatus('请先输入提示词', 'error');
          aiPrompt.focus();
          return;
        }

        aiGenerateButton.disabled = true;
        aiProgress.classList.remove('error');
        persistAiConfig();
        setAiStatus('正在生成图表结构');
        startAiProgress('校验提示词和模型配置');
        advanceAiProgress(18, '正在请求模型生成结构');

        api('/api/ai/diagram', {
          method: 'POST',
          body: JSON.stringify({
            prompt: prompt,
            diagramType: diagramType,
            config: collectAiConfig()
          })
        })
          .then(function (body) {
            advanceAiProgress(76, '已收到结构，正在创建图纸');
            setAiStatus('正在创建图纸');
            return api('/api/files', {
              method: 'POST',
              body: JSON.stringify({
                name: diagramNameFromTitle(body.diagram && body.diagram.title, body.diagram && body.diagram.typeLabel),
                xml: body.xml,
                folderId: currentFolderId
              })
            });
          })
          .then(function (body) {
            finishAiProgress('生成完成，正在打开编辑器');
            setAiStatus('已生成，正在打开', 'ok');
            notify('AI 图表已生成。', 'ok');
            window.location.href = '/editor.html?id=' + encodeURIComponent(body.file.id);
          })
          .catch(function (err) {
            if (!err || err.error !== 'not_authenticated') {
              var message = aiErrorText(err);
              stopAiProgress(message, 'error');
              setAiStatus(message, 'error');
              notify(message, 'error');
            }
          })
          .finally(function () {
            aiGenerateButton.disabled = false;
          });
      }

      function folderById(folderId) {
        return folders.find(function (folder) {
          return folder.id === folderId;
        }) || null;
      }

      function folderName(folderId) {
        var folder = folderById(folderId);
        return folder ? folder.name : '工号根目录';
      }

      function folderPath(folderId) {
        var parts = [];
        var cursor = folderById(folderId);
        var guard = 0;

        while (cursor && guard < 80) {
          parts.unshift(cursor.name);
          cursor = folderById(cursor.parentId);
          guard += 1;
        }

        parts.unshift('工号 ' + currentEmployeeId);
        return parts;
      }

      function childFolders(parentId) {
        return folders
          .filter(function (folder) {
            return (folder.parentId || null) === (parentId || null);
          })
          .sort(function (left, right) {
            return left.name.localeCompare(right.name, 'zh-CN');
          });
      }

      function childFiles(folderId) {
        return files
          .filter(function (file) {
            return (file.folderId || null) === (folderId || null);
          })
          .sort(function (left, right) {
            return left.name.localeCompare(right.name, 'zh-CN');
          });
      }

      function selectedFiles() {
        return files.filter(function (file) {
          return selectedFileIds.has(file.id);
        });
      }

      function currentSelectedFiles() {
        var visibleFileIds = new Set(childFiles(currentFolderId).map(function (file) {
          return file.id;
        }));

        return selectedFiles().filter(function (file) {
          return visibleFileIds.has(file.id);
        });
      }

      function clearSelectedFiles() {
        selectedFileIds.clear();
        updateSelectionState();
      }

      function runSequential(items, iterator) {
        return items.reduce(function (chain, item) {
          return chain.then(function () {
            return iterator(item);
          });
        }, Promise.resolve());
      }

      function isDescendantFolder(folderId, possibleAncestorId) {
        var cursor = folderById(folderId);
        var guard = 0;

        while (cursor && guard < 80) {
          if (cursor.parentId === possibleAncestorId) {
            return true;
          }

          cursor = folderById(cursor.parentId);
          guard += 1;
        }

        return false;
      }

      function setCurrentFolder(folderId) {
        selectedFileIds.clear();
        currentFolderId = folderId || null;
        currentPage = 1;
        renderLibrary();
      }

      function updateSelectionState() {
        var filesHere = childFiles(currentFolderId);
        var pageFileIdSet = new Set(pageFileIds);
        var filesOnPage = filesHere.filter(function (file) {
          return pageFileIdSet.has(file.id);
        });
        var selectedHere = currentSelectedFiles();
        var selectedOnPageCount = filesOnPage.filter(function (file) {
          return selectedFileIds.has(file.id);
        }).length;
        var selectedCountValue = selectedHere.length;
        var singleSelected = selectedCountValue === 1;
        var hasSelection = selectedCountValue > 0;

        if (selectionCount) {
          selectionCount.textContent = hasSelection ? '已选 ' + selectedCountValue + ' 个图纸' : '未选择';
        }

        if (selectAllFilesCheckbox) {
          selectAllFilesCheckbox.disabled = filesOnPage.length === 0;
          selectAllFilesCheckbox.checked = filesOnPage.length > 0 && selectedOnPageCount === filesOnPage.length;
          selectAllFilesCheckbox.indeterminate = selectedOnPageCount > 0 && selectedOnPageCount < filesOnPage.length;
        }

        [bulkOpenButton, bulkCopyButton, bulkCutButton, bulkDownloadButton, bulkDeleteButton, clearSelectionButton].forEach(function (button) {
          if (button) {
            button.disabled = !hasSelection;
          }
        });

        [bulkRenameButton, bulkShareButton, bulkInternalShareButton].forEach(function (button) {
          if (button) {
            button.disabled = !singleSelected;
            button.title = hasSelection && !singleSelected ? '该操作仅支持单张图纸' : '';
          }
        });

        Array.prototype.forEach.call(document.querySelectorAll('[data-file-row]'), function (row) {
          var fileId = row.getAttribute('data-file-row');
          var selected = selectedFileIds.has(fileId);
          row.classList.toggle('is-selected', selected);

          var checkbox = row.querySelector('.row-select');
          if (checkbox) {
            checkbox.checked = selected;
          }
        });
      }

      function updateClipboardState() {
        pasteButton.disabled = !clipboardItem;
        pasteButton.title = clipboardItem ?
          (clipboardItem.action === 'cut' ? '移动 ' : '复制 ') + clipboardItem.name + ' 到当前目录' :
          '';
      }

      function setClipboard(kind, action, item) {
        clipboardItem = {
          kind: kind,
          action: action,
          id: item.id,
          name: item.name
        };
        updateClipboardState();
        notify((action === 'cut' ? '已剪切 ' : '已复制 ') + item.name + '。', 'ok');
      }

      function setClipboardFiles(action, selected) {
        if (!selected.length) {
          return;
        }

        if (selected.length === 1) {
          setClipboard('file', action, selected[0]);
          return;
        }

        clipboardItem = {
          kind: 'files',
          action: action,
          ids: selected.map(function (file) {
            return file.id;
          }),
          name: selected.length + ' 个图纸'
        };
        updateClipboardState();
        notify((action === 'cut' ? '已剪切 ' : '已复制 ') + selected.length + ' 个图纸。', 'ok');
      }

      function operationErrorText(err) {
        var code = err && err.error;
        var messages = {
          folder_not_found: '目标文件夹不存在。',
          file_not_found: '图纸不存在。',
          invalid_folder_id: '文件夹参数不正确。',
          invalid_folder_move: '不能把文件夹移动到自己或子文件夹里。'
        };

        return messages[code] || '操作失败，请稍后重试。';
      }

      function actionButton(icon, text, className) {
        var button = document.createElement('button');
        button.type = 'button';
        button.className = className || '';
        button.title = text;
        button.setAttribute('aria-label', text);
        button.innerHTML = '<span class="btn-icon" aria-hidden="true">' + escapeHtml(icon) + '</span><span>' + escapeHtml(text) + '</span>';
        return button;
      }

      function folderMenuButton(action, text, disabled) {
        return '<button type="button" role="menuitem" data-folder-menu-action="' + action + '"' + (disabled ? ' disabled' : '') + '>' +
          escapeHtml(text) +
          '</button>';
      }

      function getFolderTreeContextMenu() {
        if (folderTreeContextMenu) {
          return folderTreeContextMenu;
        }

        folderTreeContextMenu = document.createElement('div');
        folderTreeContextMenu.className = 'folder-context-menu hidden';
        folderTreeContextMenu.setAttribute('role', 'menu');
        document.body.appendChild(folderTreeContextMenu);

        folderTreeContextMenu.addEventListener('mousedown', function (evt) {
          evt.stopPropagation();
        });
        folderTreeContextMenu.addEventListener('click', function (evt) {
          var button = evt.target.closest('[data-folder-menu-action]');

          if (!button || button.disabled) {
            return;
          }

          var folderId = folderTreeContextMenu.getAttribute('data-folder-id') || '';
          var targetFolderId = folderId || null;
          var action = button.getAttribute('data-folder-menu-action');
          hideFolderTreeContextMenu();

          if (action === 'create') {
            createFolderIn(targetFolderId);
            return;
          }

          if (action === 'delete') {
            var folder = folderById(targetFolderId);

            if (folder) {
              deleteFolder(folder);
            }
          }
        });

        return folderTreeContextMenu;
      }

      function hideFolderTreeContextMenu() {
        if (folderTreeContextMenu) {
          folderTreeContextMenu.classList.add('hidden');
        }
      }

      function showFolderTreeContextMenu(evt, folder) {
        var menu = getFolderTreeContextMenu();
        var folderId = folder ? folder.id : '';

        evt.preventDefault();
        evt.stopPropagation();
        menu.setAttribute('data-folder-id', folderId);
        menu.innerHTML = [
          folderMenuButton('create', '新建文件夹', false),
          folderMenuButton('delete', '删除文件夹', !folder)
        ].join('');
        menu.style.left = '0px';
        menu.style.top = '0px';
        menu.classList.remove('hidden');

        var left = evt.clientX;
        var top = evt.clientY;
        var menuWidth = menu.offsetWidth;
        var menuHeight = menu.offsetHeight;
        var maxLeft = Math.max(8, window.innerWidth - menuWidth - 8);
        var maxTop = Math.max(8, window.innerHeight - menuHeight - 8);

        menu.style.left = Math.min(Math.max(8, left), maxLeft) + 'px';
        menu.style.top = Math.min(Math.max(8, top), maxTop) + 'px';
      }

      function clearFolderDropTargets() {
        Array.prototype.forEach.call(document.querySelectorAll('.folder-tree-item.drop-target'), function (row) {
          row.classList.remove('drop-target');
        });
      }

      function canMoveFolderTo(folderId, targetParentId) {
        var folder = folderById(folderId);

        if (!folder || folder.id === targetParentId) {
          return false;
        }

        if ((folder.parentId || null) === (targetParentId || null)) {
          return false;
        }

        return !targetParentId || !isDescendantFolder(targetParentId, folder.id);
      }

      function moveFolderTo(folderId, targetParentId) {
        var folder = folderById(folderId);

        if (!folder) {
          notify('文件夹不存在。', 'error');
          return;
        }

        if (!canMoveFolderTo(folderId, targetParentId)) {
          notify('不能把文件夹移动到该位置。', 'error');
          return;
        }

        api('/api/folders/' + encodeURIComponent(folderId) + '/move', {
          method: 'POST',
          body: JSON.stringify({ parentId: targetParentId || null })
        })
          .then(function () {
            notify('文件夹已移动。', 'ok');
            return loadFiles();
          })
          .catch(function (err) {
            notify(operationErrorText(err), 'error');
          });
      }

      function canMoveFilesTo(fileIds, targetFolderId) {
        var ids = Array.isArray(fileIds) ? fileIds : [];

        if (!ids.length) {
          return false;
        }

        return ids.some(function (fileId) {
          var file = files.find(function (item) {
            return item.id === fileId;
          });

          return file && (file.folderId || null) !== (targetFolderId || null);
        });
      }

      function moveFilesTo(fileIds, targetFolderId) {
        var ids = (Array.isArray(fileIds) ? fileIds : []).filter(function (fileId, index, list) {
          return fileId && list.indexOf(fileId) === index;
        });

        if (!canMoveFilesTo(ids, targetFolderId)) {
          notify('图纸已经在该目录中。', 'warn');
          return;
        }

        runSequential(ids, function (fileId) {
          return api('/api/files/' + encodeURIComponent(fileId) + '/move', {
            method: 'POST',
            body: JSON.stringify({ folderId: targetFolderId || null })
          });
        })
          .then(function () {
            ids.forEach(function (fileId) {
              selectedFileIds.delete(fileId);
            });
            notify(ids.length === 1 ? '图纸已移动。' : '已移动 ' + ids.length + ' 个图纸。', 'ok');
            return loadFiles();
          })
          .catch(function (err) {
            notify(operationErrorText(err), 'error');
          });
      }

      function draggedFilesFromEvent(evt) {
        if (evt.dataTransfer) {
          var raw = evt.dataTransfer.getData('application/x-company-files');

          if (raw) {
            try {
              var parsed = JSON.parse(raw);

              if (Array.isArray(parsed)) {
                return parsed;
              }
            } catch (ignore) {}
          }
        }

        return draggedFileIds;
      }

      function renderFolderTree() {
        folderTree.innerHTML = '';

        function renderNode(folder, level) {
          var row = document.createElement('button');
          var folderId = folder ? folder.id : null;
          row.type = 'button';
          row.className = 'folder-tree-item' +
            (folder ? ' can-drag' : ' is-root') +
            ((currentFolderId || null) === (folderId || null) ? ' active' : '');
          row.draggable = Boolean(folder);
          row.setAttribute('data-folder-id', folderId || '');
          row.style.setProperty('--level', level);
          row.innerHTML = [
            '<span class="folder-glyph" aria-hidden="true">▣</span>',
            '<span class="folder-tree-name">' + escapeHtml(folder ? folder.name : '工号 ' + currentEmployeeId) + '</span>'
          ].join('');
          row.addEventListener('click', function () {
            hideFolderTreeContextMenu();
            setCurrentFolder(folderId);
          });
          row.addEventListener('contextmenu', function (evt) {
            showFolderTreeContextMenu(evt, folder);
          });

          if (folder) {
            row.addEventListener('dragstart', function (evt) {
              hideFolderTreeContextMenu();
              draggedFolderId = folder.id;
              draggedFileIds = [];
              row.classList.add('dragging');

              if (evt.dataTransfer) {
                evt.dataTransfer.effectAllowed = 'move';
                evt.dataTransfer.setData('application/x-company-folder', folder.id);
                evt.dataTransfer.setData('text/plain', folder.id);
              }
            });
          }

          row.addEventListener('dragover', function (evt) {
            var canDropFolder = draggedFolderId && canMoveFolderTo(draggedFolderId, folderId);
            var canDropFiles = draggedFileIds.length > 0 && canMoveFilesTo(draggedFileIds, folderId);

            if (canDropFolder || canDropFiles) {
              evt.preventDefault();
              clearFolderDropTargets();
              row.classList.add('drop-target');

              if (evt.dataTransfer) {
                evt.dataTransfer.dropEffect = 'move';
              }
            }
          });
          row.addEventListener('dragleave', function (evt) {
            if (!evt.relatedTarget || !row.contains(evt.relatedTarget)) {
              row.classList.remove('drop-target');
            }
          });
          row.addEventListener('drop', function (evt) {
            var sourceFileIds = draggedFilesFromEvent(evt);
            var sourceFolderId = evt.dataTransfer && evt.dataTransfer.getData('application/x-company-folder') || draggedFolderId;

            clearFolderDropTargets();
            row.classList.remove('drop-target');

            if (sourceFileIds.length) {
              evt.preventDefault();
              moveFilesTo(sourceFileIds, folderId);
              draggedFileIds = [];
              return;
            }

            if (!sourceFolderId) {
              return;
            }

            evt.preventDefault();
            moveFolderTo(sourceFolderId, folderId);
          });
          row.addEventListener('dragend', function () {
            draggedFolderId = null;
            draggedFileIds = [];
            row.classList.remove('dragging');
            clearFolderDropTargets();
          });
          folderTree.appendChild(row);

          childFolders(folderId).forEach(function (child) {
            renderNode(child, level + 1);
          });
        }

        renderNode(null, 0);
      }

      function directoryItems(foldersHere, filesHere) {
        return foldersHere.map(function (folder) {
          return { kind: 'folder', item: folder };
        }).concat(filesHere.map(function (file) {
          return { kind: 'file', item: file };
        }));
      }

      function clampCurrentPage(totalItems) {
        totalPageCount = Math.max(1, Math.ceil(totalItems / pageSize));
        currentPage = Math.min(Math.max(1, currentPage), totalPageCount);
      }

      function renderPagination(totalItems, folderCount, fileCount) {
        var start = totalItems === 0 ? 0 : (currentPage - 1) * pageSize + 1;
        var end = Math.min(totalItems, currentPage * pageSize);

        paginationSummary.textContent = totalItems === 0 ?
          '当前目录为空' :
          '当前目录 ' + totalItems + ' 项（' + folderCount + ' 个文件夹 · ' + fileCount + ' 个图纸），显示 ' + start + '-' + end;
        pageIndicator.textContent = '第 ' + currentPage + ' / ' + totalPageCount + ' 页';
        prevPageButton.disabled = currentPage <= 1;
        nextPageButton.disabled = currentPage >= totalPageCount;
        pageSizeSelect.value = String(pageSize);
      }

      function goToPage(page) {
        currentPage = Math.min(Math.max(1, page), totalPageCount);
        renderLibrary();
      }

      function renderLibrary() {
        var current = currentFolderId ? folderById(currentFolderId) : null;

        if (currentFolderId && !current) {
          currentFolderId = null;
        }

        var foldersHere = childFolders(currentFolderId);
        var filesHere = childFiles(currentFolderId);
        var itemsHere = directoryItems(foldersHere, filesHere);
        var totalItems = itemsHere.length;
        var pageItems;
        var visibleFileIds = new Set(filesHere.map(function (file) {
          return file.id;
        }));

        clampCurrentPage(totalItems);
        pageItems = itemsHere.slice((currentPage - 1) * pageSize, currentPage * pageSize);
        pageFileIds = pageItems
          .filter(function (entry) {
            return entry.kind === 'file';
          })
          .map(function (entry) {
            return entry.item.id;
          });

        selectedFileIds.forEach(function (fileId) {
          if (!visibleFileIds.has(fileId)) {
            selectedFileIds.delete(fileId);
          }
        });

        rows.innerHTML = '';
        renderFolderTree();
        currentFolderTitle.textContent = folderName(currentFolderId);
        folderBreadcrumb.textContent = folderPath(currentFolderId).join(' / ');
        emptyState.classList.toggle('hidden', totalItems > 0);

        pageItems.forEach(function (entry) {
          if (entry.kind === 'folder') {
            renderFolderRow(entry.item);
          } else {
            renderFileRow(entry.item);
          }
        });
        renderPagination(totalItems, foldersHere.length, filesHere.length);
        setStatus(folders.length + ' 个文件夹 · ' + files.length + ' 个图纸', 'ok');
        updateClipboardState();
        updateSelectionState();
      }

            }
