<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>注册 - 公司画图工具</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/company.css?v=accounts-20260704">
</head>
<body class="login-page register-page">
  <main class="login-shell" aria-label="公司画图工具注册">
    <section class="login-visual" aria-hidden="true">
      <div class="login-wordmark">
        <img src="/images/drawlogo.svg" alt="">
        <div>
          <span>Company Draw</span>
          <strong>邀请码注册</strong>
        </div>
      </div>
      <div class="blueprint invite-blueprint">
        <div class="blueprint-node node-start">邀请码</div>
        <div class="blueprint-node node-system">账号</div>
        <div class="blueprint-node node-api">会话</div>
        <div class="blueprint-node node-data">图纸</div>
        <div class="blueprint-line line-a"></div>
        <div class="blueprint-line line-b"></div>
        <div class="blueprint-line line-c"></div>
        <div class="blueprint-dot dot-a"></div>
        <div class="blueprint-dot dot-b"></div>
      </div>
      <div class="login-caption">
        <span>内部准入</span>
        <span>一次性邀请码</span>
      </div>
    </section>

    <section class="panel login-card">
      <div class="login-card-header">
        <span class="eyebrow">Create account</span>
        <h1>注册账号</h1>
        <p>输入管理员发放的邀请码，激活你的工号空间。</p>
      </div>
      <form id="registerForm" autocomplete="on">
        <label class="field" for="employeeId">
          <span class="field-label">工号</span>
          <span class="input-wrap">
            <span class="input-icon" aria-hidden="true">ID</span>
            <input id="employeeId" name="employeeId" autocomplete="username" autofocus required>
          </span>
        </label>
        <label class="field" for="name">
          <span class="field-label">姓名</span>
          <span class="input-wrap">
            <span class="input-icon" aria-hidden="true">名</span>
            <input id="name" name="name" autocomplete="name">
          </span>
        </label>
        <label class="field" for="inviteCode">
          <span class="field-label">邀请码</span>
          <span class="input-wrap">
            <span class="input-icon" aria-hidden="true">码</span>
            <input id="inviteCode" name="inviteCode" autocomplete="one-time-code" required>
          </span>
        </label>
        <label class="field" for="password">
          <span class="field-label">密码</span>
          <span class="input-wrap">
            <span class="input-icon" aria-hidden="true">#</span>
            <input id="password" name="password" type="password" autocomplete="new-password" minlength="6" required>
          </span>
        </label>
        <label class="field" for="confirmPassword">
          <span class="field-label">确认密码</span>
          <span class="input-wrap">
            <span class="input-icon" aria-hidden="true">#</span>
            <input id="confirmPassword" name="confirmPassword" type="password" autocomplete="new-password" minlength="6" required>
          </span>
        </label>
        <button id="submitButton" class="primary full login-submit" type="submit">
          <span class="btn-icon" aria-hidden="true">+</span>
          <span class="button-label">注册并进入</span>
        </button>
        <div id="message" class="status error login-message" role="alert"></div>
        <div class="auth-switch">
          <span>已有账号？</span>
          <a id="loginLink" href="/login.html">返回登录</a>
        </div>
      </form>
    </section>
  </main>
  <script>
    (function () {
      var form = document.getElementById('registerForm');
      var employeeId = document.getElementById('employeeId');
      var name = document.getElementById('name');
      var inviteCode = document.getElementById('inviteCode');
      var password = document.getElementById('password');
      var confirmPassword = document.getElementById('confirmPassword');
      var button = document.getElementById('submitButton');
      var message = document.getElementById('message');
      var loginLink = document.getElementById('loginLink');
      var params = new URLSearchParams(window.location.search);
      var next = params.get('next') || '/app.html';

      function safeNext(value) {
        try {
          var url = new URL(value, window.location.origin);

          if (url.origin === window.location.origin) {
            return url.pathname + url.search + url.hash;
          }
        } catch (e) {}

        return '/app.html';
      }

      function setMessage(text) {
        message.textContent = text || '';
      }

      function setBusy(isBusy) {
        button.disabled = isBusy;
        button.classList.toggle('is-loading', isBusy);
        button.querySelector('.button-label').textContent = isBusy ? '注册中' : '注册并进入';
      }

      loginLink.href = '/login.html?next=' + encodeURIComponent(safeNext(next));

      fetch('/api/me', { credentials: 'same-origin' })
        .then(function (res) { return res.ok ? res.json() : null; })
        .then(function (session) {
          if (session && session.authenticated) {
            window.location.replace(safeNext(next));
          }
        })
        .catch(function () {});

      form.addEventListener('submit', function (evt) {
        evt.preventDefault();
        setMessage('');

        if (password.value !== confirmPassword.value) {
          setMessage('两次输入的密码不一致。');
          confirmPassword.focus();
          return;
        }

        setBusy(true);

        fetch('/api/register', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            employeeId: employeeId.value.trim(),
            name: name.value.trim(),
            inviteCode: inviteCode.value.trim(),
            password: password.value
          })
        })
          .then(function (res) {
            return res.json().then(function (body) {
              if (!res.ok) {
                throw body;
              }

              return body;
            });
          })
          .then(function () {
            window.location.replace(safeNext(next));
          })
          .catch(function (err) {
            if (err && err.error === 'invalid_employee_id') {
              setMessage('工号只能包含字母、数字、下划线或短横线。');
            } else if (err && err.error === 'weak_password') {
              setMessage('密码至少需要 ' + (err.minLength || 6) + ' 位。');
            } else if (err && err.error === 'invalid_invite_code') {
              setMessage('邀请码无效或已被使用。');
            } else {
              setMessage('注册失败，请稍后重试。');
            }
          })
          .finally(function () {
            setBusy(false);
          });
      });
    }());
  </script>
</body>
</html>
