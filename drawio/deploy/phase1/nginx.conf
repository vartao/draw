server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-store, max-age=0" always;
        try_files $uri =404;
    }

    # Phase 2 will proxy the login/session/file API here.
    location /api/ {
        return 501;
    }

    # Phase 6 can point this at the internal draw.io export server.
    location /export {
        return 501;
    }

    location /plantuml {
        return 501;
    }
}
