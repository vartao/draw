map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream company_drawio {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name drawio.internal.example.com;

    location /healthz {
        proxy_pass http://company_drawio/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name drawio.internal.example.com;

    ssl_certificate /etc/nginx/certs/drawio.internal.example.com.crt;
    ssl_certificate_key /etc/nginx/certs/drawio.internal.example.com.key;
    ssl_session_timeout 1d;
    ssl_session_cache shared:drawio_ssl:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 32m;

    access_log /var/log/nginx/company-drawio.access.log;
    error_log /var/log/nginx/company-drawio.error.log warn;

    location /healthz {
        proxy_pass http://company_drawio/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_http_version 1.1;
        proxy_pass http://company_drawio;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
